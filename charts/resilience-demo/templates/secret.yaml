{{- if and .Values.auth.enabled (not .Values.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "resilience-demo.secretName" . }}
  labels:
    {{- include "resilience-demo.labels" . | nindent 4 }}
type: Opaque
stringData:
  API_KEY: {{ required "auth.apiKey is required when auth.enabled=true and no existingSecret is set" .Values.auth.apiKey | quote }}
{{- end }}
