run:
  timeout: 5m
  go: "1.23"

linters:
  disable-all: true
  enable:
    - gofmt
    - govet
    - errcheck
    - staticcheck
    - gosimple
    - ineffassign
    - unused
    - misspell

linters-settings:
  cyclop:
    max-complexity: 10
  funlen:
    lines: 80
    statements: 50
  gocognit:
    min-complexity: 15

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - funlen
