name: Feature request
description: Suggest a new resilience primitive, adapter, or improvement.
title: "feat: <short summary>"
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please check open issues and the
        [CHANGELOG](../blob/main/CHANGELOG.md) first. Keep in mind the
        **zero-external-runtime-dependency** rule for core packages — new
        third-party dependencies belong in adapter packages only.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem are you trying to solve? What is missing or painful today?
      placeholder: |
        When rate limiting across N replicas I need ... but the library only offers ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the API or behavior you would like. Sketch a signature or usage example if you can.
      placeholder: |
        Add a `WithClock(clock.Clock)` option so ...
      render: go
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you evaluated and why they fall short (including workarounds).
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - rate limiting algorithm
        - circuit breaker
        - bulkhead
        - retry / backoff
        - timeout
        - fallback / hedge
        - pipeline
        - middleware / interceptors
        - distributed / Redis store
        - demo server
        - frontend
        - docs / examples
        - other
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a PR to implement this.
          required: false
