name: Release

on:
  push:
    tags:
      # SemVer tags only (e.g. v1.2.3, v1.2.3-rc.1).
      - "v*"

# Least-privilege defaults; the release job elevates what it needs.
permissions:
  contents: read

jobs:
  # ─── Test gate ──────────────────────────────────────────────────────────────
  # Run the full race suite once before building/publishing any artifacts.
  test:
    name: Test Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v7
        with:
          go-version: "1.25"
          cache: true

      - name: Run tests
        run: go test -race -count=1 ./...

  # ─── Build, sign, publish via goreleaser ────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write # create the GitHub Release + upload assets
      packages: write # push images to GHCR
      id-token: write # cosign keyless signing + SLSA provenance (OIDC)
      attestations: write # actions/attest-build-provenance
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v7
        with:
          go-version: "1.25"
          cache: true

      # Multi-arch Docker builds need QEMU (arm64 emulation) + buildx.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # GITHUB_TOKEN has packages:write via the job permissions above;
          # no separate secret is required for GHCR.
          password: ${{ secrets.GITHUB_TOKEN }}

      # Supply-chain tooling: syft (SBOM) + cosign (keyless signing).
      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Run goreleaser
        id: goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Enables cosign keyless (Fulcio/Rekor) signing in CI.
          COSIGN_EXPERIMENTAL: "1"
          COSIGN_YES: "true"

      # ─── SLSA provenance ──────────────────────────────────────────────────────
      # Attest the released binaries (glob over goreleaser's dist/) so consumers
      # can verify build provenance with `gh attestation verify`.
      - name: Attest binary provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: "dist/*.tar.gz"

      # Attest the multi-arch container image by digest. goreleaser writes an
      # artifacts.json describing pushed images; extract the manifest digest.
      - name: Resolve pushed image digest
        id: image
        run: |
          set -euo pipefail
          # goreleaser's {{ .Version }} strips the leading "v", so the pushed
          # tag is e.g. 0.1.0 while GITHUB_REF_NAME is v0.1.0 — strip it to match.
          IMAGE="ghcr.io/sanskarpan/rate-limiter-circuit-breaker:${GITHUB_REF_NAME#v}"
          DIGEST="$(docker buildx imagetools inspect "${IMAGE}" \
            --format '{{ json .Manifest.Digest }}' | tr -d '"')"
          echo "digest=${DIGEST}" >> "${GITHUB_OUTPUT}"

      - name: Attest container image provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/sanskarpan/rate-limiter-circuit-breaker
          subject-digest: ${{ steps.image.outputs.digest }}
          push-to-registry: true
