name: Release

on:
  push:
    tags:
      # SemVer tags only (e.g. v1.2.3, v1.2.3-rc.1).
      - "v*"

permissions:
  contents: write

jobs:
  # ─── Test gate ──────────────────────────────────────────────────────────────
  # Run the full race suite once before building/publishing any artifacts.
  test:
    name: Test Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v7
        with:
          go-version: "1.24"
          cache: true

      - name: Run tests
        run: go test -race -count=1 ./...

  # ─── Build cross-platform binaries ──────────────────────────────────────────
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v7
        with:
          go-version: "1.24"
          cache: true

      - name: Build release binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          go build \
            -ldflags="-s -w -X github.com/sanskarpan/Rate-Limiter-Circuit-Breaker/server/version.Version=${VERSION}" \
            -o "bin/demo-server-${{ matrix.goos }}-${{ matrix.goarch }}" \
            ./server/

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: demo-server-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/demo-server-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 1
          if-no-files-found: error

  # ─── Publish GitHub Release ─────────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          # Each build job uploaded a single binary; flatten them all into ./bin.
          path: bin
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            bin/demo-server-linux-amd64
            bin/demo-server-linux-arm64
            bin/demo-server-darwin-amd64
            bin/demo-server-darwin-arm64
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
