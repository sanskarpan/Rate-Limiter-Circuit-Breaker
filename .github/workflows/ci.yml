name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  # Primary Go version (matches the go.mod floor). Used by non-matrix jobs and
  # as the single matrix entry that uploads coverage.
  GO_VERSION: "1.25"

jobs:
  # ─── Unit tests (Go version matrix) ─────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      # Don't cancel the whole matrix if one Go version fails — we want to see
      # which specific versions break.
      fail-fast: false
      matrix:
        # go.mod floor ("1.25", raised by the optional OTel adapter) plus the latest release. Coverage is
        # uploaded only from the primary version (see condition below).
        go-version: ["1.25", "1.26"]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Run tests with race detector
        run: go test -race -count=3 -timeout=5m ./...

      - name: Generate coverage
        # Only compute coverage on the primary version; other entries just run
        # the race suite above.
        if: matrix.go-version == env.GO_VERSION
        run: go test -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        # Upload once (primary version only) to avoid duplicate reports.
        # NOTE: on public repos a CODECOV_TOKEN repo secret may be required for
        # the coverage badge to populate reliably. Add it under
        # Settings → Secrets and variables → Actions if the badge stays empty.
        if: matrix.go-version == env.GO_VERSION
        uses: codecov/codecov-action@v7
        with:
          file: coverage.out
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ─── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build demo server
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/demo-server ./server/

      - name: Build examples
        run: go build ./examples/...

  # ─── Verify zero external runtime dependencies ──────────────────────────────
  verify-zero-deps:
    name: Verify Zero External Deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify core library has no external deps
        run: make verify-deps

  # ─── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint
        # version: latest resolves to golangci-lint v2, which matches the
        # v2-format .golangci.yml in the repo.
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout 5m

  # ─── Fuzz (short run on PR) ──────────────────────────────────────────────────
  fuzz:
    name: Fuzz Tests (short)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Fuzz token bucket
        run: go test -fuzz=FuzzTokenBucket -fuzztime=30s ./ratelimit/tokenbucket/ || true

      - name: Fuzz GCRA
        run: go test -fuzz=FuzzGCRA -fuzztime=30s ./ratelimit/gcra/ || true

  # ─── Integration tests (with Redis) ─────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run integration tests
        env:
          REDIS_ADDR: localhost:6379
        run: go test -tags=integration -race -count=1 ./...

  # ─── Vulnerability scan (govulncheck) ───────────────────────────────────────
  govulncheck:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          # Use the version declared in go.mod so the scan matches our toolchain.
          go-version-file: go.mod
          cache: true

      - name: Run govulncheck
        # Fails CI on reachable vulnerabilities in our DEPENDENCIES. Standard-
        # library (toolchain) vulnerabilities are surfaced as warnings but do not
        # fail CI, because they are fixed only by upgrading the Go toolchain once
        # the patched release ships (e.g. GO-2026-5856 is "Fixed in go1.26.5",
        # which is not yet released) — nothing we can change in this repo.
        run: |
          set +e
          OUT=$(go run golang.org/x/vuln/cmd/govulncheck@latest ./... 2>&1)
          echo "$OUT"
          DEP_VULNS=$(echo "$OUT" | grep -c '^  Module:')
          if [ "$DEP_VULNS" -gt 0 ]; then
            echo "::error::govulncheck found $DEP_VULNS reachable dependency vulnerability(ies)"
            exit 1
          fi
          if echo "$OUT" | grep -q 'Standard library'; then
            echo "::warning::govulncheck: only standard-library (toolchain) vulnerabilities found; upgrade Go when the patched release ships. Not failing CI."
          fi
          exit 0

  # ─── End-to-end (Playwright against live server + frontend) ──────────────────
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    # E2E is heavier and does not need Redis; run it on the main branch and PRs.
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    env:
      # Demo server: no API_KEY so control endpoints stay open for the tests.
      PORT: "8080"
      NEXT_PUBLIC_API_URL: http://localhost:8080
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # ── Build & start the Go demo server on :8080 ──────────────────────────
      - name: Build demo server
        working-directory: .
        run: CGO_ENABLED=0 go build -o bin/demo-server ./server/

      - name: Start demo server (background)
        working-directory: .
        run: |
          ./bin/demo-server > /tmp/demo-server.log 2>&1 &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for demo server /health/live
        working-directory: .
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/health/live > /dev/null 2>&1; then
              echo "demo server is live"; exit 0
            fi
            sleep 1
          done
          echo "demo server did not become healthy in time"; cat /tmp/demo-server.log; exit 1

      # ── Build & start the Next.js frontend on :3000 ────────────────────────
      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build

      - name: Start frontend (background)
        run: |
          PORT=3000 npm run start > /tmp/frontend.log 2>&1 &
          echo "FRONTEND_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for frontend :3000
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000 > /dev/null 2>&1; then
              echo "frontend is up"; exit 0
            fi
            sleep 1
          done
          echo "frontend did not become ready in time"; cat /tmp/frontend.log; exit 1

      # ── Run Playwright end-to-end tests ────────────────────────────────────
      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7
          if-no-files-found: ignore

  # ─── Frontend (Next.js playground) ──────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint . --ignore-pattern e2e

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
        run: npx next build
